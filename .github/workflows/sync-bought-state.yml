name: Sync bought state

on:
  push:
    paths:
      - '.github/workflows/sync-bought-state.yml'
      - '.github/scripts/sync-bought-state.cjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch bought state sync
        run: node .github/scripts/sync-bought-state.cjs
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Sync bought state with Supabase" || exit 0
          git push
