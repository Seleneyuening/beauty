name: Merge beauty refresh

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge refresh script into main script
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('index.html')
          s = path.read_text(encoding='utf-8')
          prefix = '<script>\nwindow.applyBeautyRefresh = function applyBeautyRefresh(){'
          sep = '\n</script>\n<script>\n/* ====== 产品数据：加 img 字段即可显示真实图片 ====== */'
          start = s.find(prefix)
          if start == -1:
              raise SystemExit('refresh script start not found')
          mid = s.find(sep, start)
          if mid == -1:
              raise SystemExit('script separator not found')
          block = s[start + len('<script>\n'):mid].rstrip()
          s = s[:start] + '<script>\n' + block + '\n\n/* ====== 产品数据：加 img 字段即可显示真实图片 ====== */' + s[mid + len(sep):]
          old = 'applyBeautyRefresh(); buildChips(); stats(); render();'
          new = 'if (typeof applyBeautyRefresh === "function") { try { applyBeautyRefresh(); } catch(e) { console.error(e); } } buildChips(); stats(); render();'
          if old not in s:
              raise SystemExit('startup call not found')
          s = s.replace(old, new, 1)
          path.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Merge beauty refresh into page script"
          git push
