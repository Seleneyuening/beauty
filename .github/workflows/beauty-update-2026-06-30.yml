          if (!text.includes(marker)) {
            const target = 'buildChips(); stats(); render();';
            if (!text.includes(target)) throw new Error('Render bootstrap line not found');
            text = text.replace(target, `${block}\n${target}`);
            fs.writeFileSync(path, text);
          } else {
            console.log('Marker already present; no index.html change needed.');
          }
          NODE

      - name: Commit page update and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/beauty-update-2026-06-30.yml
          git add index.html
