name: Inline beauty refresh

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inline refresh script
        run: |
          python3 <<'PY'
          from pathlib import Path
          index = Path('index.html')
          refresh = Path('beauty-refresh.js')
          s = index.read_text(encoding='utf-8')
          js = refresh.read_text(encoding='utf-8')
          marker = '<script src="beauty-refresh.js"></script>\n<script>'
          replacement = '<script>\n' + js + '\n</script>\n<script>'
          if marker not in s:
              raise SystemExit('external script marker not found')
          s = s.replace(marker, replacement, 1)
          index.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Inline beauty refresh products and styling"
          git push
